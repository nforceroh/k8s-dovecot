## Dovecot configuration file

# Required by dovecot 2.4+; must appear before any other setting.
dovecot_config_version = 2.4.0
dovecot_storage_version = 2.4.0

# Protocols to serve
protocols = imap lmtp submission pop3
# Greeting banner shown to clients
login_greeting = Dovecot ready.

# Include all conf.d/*.conf files
!include conf.d/*.conf

# Optional local overrides (not tracked in image)
!include_try local.conf
