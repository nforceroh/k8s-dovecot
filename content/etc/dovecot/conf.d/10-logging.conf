## Dovecot logging configuration
# All paths are set to stdout by default so container logs are visible.
# Overridden at init time via LOG_PATH / LOG_DEBUG_PATH / LOG_INFO_PATH env vars.

log_path = /dev/stdout
info_log_path = /dev/stdout
debug_log_path = /dev/stdout

# Authentication logging (set at init time based on DEBUG env var).
auth_verbose = no
auth_debug = no
auth_debug_passwords = no
mail_debug = no
