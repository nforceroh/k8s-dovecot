# Mail quota configuration
# Quota is configured per-user in the SQL database via the quota_rule field

service quota-status {
  executable = quota-status -p p
  inet_listener {
    port = 12340
  }
  unix_listener quota-status {
    user = vmail
    group = mail
  }
}

plugin {
  # Maildir quota backend
  quota = maildir:User quota
  
  # Default quota rule: unlimited storage unless specified per-user
  # Format: *:storage=limit_in_bytes or *:storage=limit_with_unit
  # Units: B, K, M, G (e.g., 1G = 1 gigabyte)
  # 0 = unlimited
  quota_rule = *:storage=0
  
  # Trash folder is separate from main quota
  # E.g., if user has 5G quota, Trash can hold additional 500MB
  quota_rule2 = Trash:storage=+500M
  
  # Grace period: allow 10% over quota before blocking new messages
  quota_grace = 10%%
  
  # Which mailboxes to exclude from quota
  #quota_rule3 = Drafts:ignore
  
  # Quota warnings
  quota_warning = storage=95%% quota-warning 95 %u
  quota_warning2 = storage=80%% quota-warning 80 %u
  quota_warning3 = storage=50%% quota-warning 50 %u
}

