## Dovecot process master configuration

# Default virtual memory size limit for service processes.
# Set at init time; overridden per-service where needed (e.g. fts.conf).
default_vsz_limit = 256M

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service submission-login {
  inet_listener submission {
    port = 587
  }
}

service imap {
  executable = imap
}

service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
}

service pop3 {
  executable = pop3
}

service auth {
  unix_listener auth-userdb {
    mode = 0660
    user = vmail
    group = mail
  }
  user = dovecot
}

service auth-worker {
  user = root
}

service dict {
  unix_listener dict {
    mode = 0600
    user = vmail
  }
}
