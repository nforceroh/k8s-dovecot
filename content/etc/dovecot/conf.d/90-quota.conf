service quota-status {
  executable = quota-status -p p
  inet_listener quota-status {
    port = 12340
  }
  unix_listener quota-status {
    user = vmail
    group = mail
  }
}

# In 2.4, use the named quota block
quota "User quota" {
  driver = maildir
  
  # Default limit (equivalent to quota_rule = *:storage=0)
  storage_size = 0

  # Quota warnings are now nested sections
  warning warn-95 {
    quota_storage_percentage = 95
    execute quota-warning {
      args = 95 %{user}
    }
  }
  
  warning warn-80 {
    quota_storage_percentage = 80
    execute quota-warning {
      args = 80 %{user}
    }
  }

  warning warn-50 {
    quota_storage_percentage = 50
    execute quota-warning {
      args = 50 %{user}
    }
  }
}

# The Trash extra limit is now handled inside the namespace block
# This usually goes in 10-mail.conf or 15-mailboxes.conf
namespace inbox {
  mailbox Trash {
    quota_storage_extra = 500M
  }
}
