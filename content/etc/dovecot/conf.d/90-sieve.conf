# Global plugins and directories
sieve_plugins = sieve_imapsieve sieve_extprograms
sieve_pipe_bin_dir = /data/sieve

# Matches Example: sieve_extensions block (BOOLEANS ONLY)
sieve_extensions {
  mboxmetadata = yes
  imap4flags = yes
  enotify = yes
  virustest = yes
  editheader = yes
  servermetadata = yes
  environment = yes
  spamtest = yes
  spamtestplus = yes
}

# Matches Example: sieve_global_extensions block
sieve_global_extensions {
  vnd.dovecot.pipe = yes
  vnd.dovecot.environment = yes
  vnd.dovecot.debug = yes
}

# Matches Example: sieve_script blocks
sieve_script personal {
  driver = file
  path = /data/sieve/%{user}.sieve
}

sieve_script default {
  type = default
  driver = file
  path = /data/sieve/default.sieve
}

sieve_script spam_filter {
  type = before
  driver = file
  path = /data/sieve/moveToPotentialSpam.sieve
}
