# Global Sieve Plugins
sieve_plugins = sieve_imapsieve sieve_extprograms
sieve_pipe_bin_dir = /data/sieve

# Enabled Sieve Extensions (Standard 2.4 string syntax)
sieve_extensions = +editheader +mboxmetadata +servermetadata +imapflags +notify +spamtest +spamtestplus +virustest +environment
sieve_global_extensions = +vnd.dovecot.pipe +vnd.dovecot.environment +vnd.dovecot.debug

# Spamtest Configuration (Flattened Global Variables)
# If these still fail, the 'sieve_spamtest' plugin might not be in your lib dir
sieve_spamtest_status_type = text
sieve_spamtest_status_header = X-Spam-Flag
sieve_spamtest_text_value1 = NO
sieve_spamtest_text_value10 = YES

# Sieve Script Locations
sieve_script personal {
  driver = file
  path = /data/sieve/%{user}.sieve
}

sieve_script default {
  type = default
  driver = file
  path = /data/sieve/default.sieve
}

sieve_script spam_filter {
  type = before
  driver = file
  path = /data/sieve/moveToPotentialSpam.sieve
}

# Note: If these trigger "Unknown section", they MUST be moved into 
# the 'namespace inbox' block in 15-mailboxes.conf
mailbox Spam {
  sieve_script learn-spam {
    type = before
    cause = copy
    path = /data/sieve/learn-spam.sieve
  }
}

imapsieve_from Spam {
  sieve_script learn-ham-from-spam {
    type = before
    cause = copy
    path = /data/sieve/learn-ham.sieve
  }
}

imapsieve_from PotentialSpam {
  sieve_script learn-ham-from-potential {
    type = before
    cause = copy
    path = /data/sieve/learn-ham.sieve
  }
}
