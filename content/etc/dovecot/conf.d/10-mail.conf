## Mailbox locations and namespaces

# Default mail location; overridden per-user by the SQL userdb query
# (which returns homedir/maildir from the mailbox table).
mail_location = maildir:%h/Maildir

# System user and group used to access mails.
# Set at init time via VMAIL_UID / VMAIL_GID env vars.
mail_uid = vmail
mail_gid = mail

# Allow processes to access /var/mail
mail_privileged_group = mail

namespace inbox {
  inbox = yes
}
