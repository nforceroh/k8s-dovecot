name: Update Base Image Digest

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-base-digest:
    runs-on: ubuntu-latest
    env:
      BASE_IMAGE: ghcr.io/nforceroh/k8s-alpine-baseimage:3.23

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Resolve latest digest for base image
        id: digest
        run: |
          set -euo pipefail

          # Use credentials when available (private GHCR), otherwise fallback to anonymous.
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            DIGEST="$(skopeo inspect --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" --format '{{.Digest}}' "docker://${BASE_IMAGE}")"
          else
            DIGEST="$(skopeo inspect --format '{{.Digest}}' "docker://${BASE_IMAGE}")"
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Update Dockerfile FROM line
        env:
          DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          set -euo pipefail

          BASE_IMAGE_RE='ghcr\.io/nforceroh/k8s-alpine-baseimage:3\.23(@sha256:[a-f0-9]{64})?'
          sed -i -E "s|^FROM[[:space:]]+${BASE_IMAGE_RE}$|FROM ${BASE_IMAGE}@${DIGEST}|" Dockerfile

          if ! grep -Eq "^FROM[[:space:]]+${BASE_IMAGE}@${DIGEST}$" Dockerfile; then
            echo "Failed to update Dockerfile FROM line"
            exit 1
          fi

      - name: Create pull request if digest changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update base image digest"
          title: "chore: update k8s-alpine-baseimage digest"
          body: |
            Updates the pinned digest for:
            - ghcr.io/nforceroh/k8s-alpine-baseimage:3.23

            This PR was created automatically.
          branch: chore/update-baseimage-digest
          delete-branch: true